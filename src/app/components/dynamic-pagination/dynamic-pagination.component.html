<div class="pagination">
	<button (click)="setPage(page-1)" [disabled]="page<=1">«</button>
	<button *ngFor="let p of [].constructor(totalPages); let i = index" (click)="setPage(i+1)" [class.active]="page===i+1">{{ i+1 }}</button>
	<button (click)="setPage(page+1)" [disabled]="page>=totalPages">»</button>
</div>
